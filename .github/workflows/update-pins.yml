---
name: Update flake pins

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix flake update
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake pins"
          branch: update-flake-pins
          title: "chore: update flake pins"
          body: "Automated flake input pin update."
